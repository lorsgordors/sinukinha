<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Sinuca Estilo 8 Ball Pool - Power Shot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-stage">
    <div class="table-shell">
      <div class="table-controls">
        <button id="effectBtn">Efeito</button>
        <button id="resetBtn">Reiniciar</button>
      </div>
    <canvas id="c" width="1200" height="600"></canvas>

    <div id="powerControl" class="power-control">
      <div class="power-title">Força</div>
      <div id="powerTrack" class="power-track" aria-label="Controle de força">
        <div id="powerFill" class="power-fill"></div>
        <div id="powerStick" class="power-stick"></div>
        <div id="powerKnob" class="power-knob"></div>
      </div>
      <div class="power-hint">Puxe e solte</div>
    </div>
    </div>
  </div>

  <div id="spinModal" class="spin-modal hidden">
    <div class="spin-panel">
      <button id="spinCloseBtn" class="spin-close" aria-label="Fechar">×</button>
      <h3>Efeito na Branca</h3>
      <p class="spin-help">Clique no ponto da bola para definir topspin, backspin ou efeito lateral.</p>
      <div id="spinPad" class="spin-pad" role="button" aria-label="Selecionar efeito na branca">
        <div class="spin-axis spin-axis-h"></div>
        <div class="spin-axis spin-axis-v"></div>
        <div id="spinDot" class="spin-dot"></div>
      </div>
      <div id="spinLabel" class="spin-label">Centro</div>
      <button id="spinResetBtn" class="spin-reset">Sem efeito</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
